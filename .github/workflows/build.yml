name: Build PS4 Linux Payloads

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang llvm yasm zip

      - name: Build PS4 payloads in linux/
        run: |
          cd linux
          make

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/bin artifacts/elf
          find linux/aio -name '*.bin' -exec cp {} artifacts/bin/ ;
          find linux/aio -name '*.elf' -exec cp {} artifacts/elf/ ;

      - name: Zip artifacts
        run: |
          cd artifacts
          zip -r ps4-payloads-bin.zip bin
          zip -r ps4-payloads-elf.zip elf

      - name: Generate Release Notes
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%h - %s")
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          FILE_COUNT=$(find artifacts/bin -name '*.bin' | wc -l)

          cat <<EOF > release_notes.md
          Automated build of PS4 payloads.

          ### Build Details
          - **Date & Time:** $BUILD_DATE
          - **Total Files Compiled:** $FILE_COUNT
          - **Latest Commit:** $COMMIT_MSG
          EOF

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          tag_name: v${{ github.run_number }}
          name: "PS4 Payloads Release v${{ github.run_number }}"
          body_path: release_notes.md
          files: |
            artifacts/ps4-payloads-bin.zip
            artifacts/ps4-payloads-elf.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
